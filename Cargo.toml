[package]
name = "mirui"
version = "0.1.1"
edition = "2024"
authors = ["Benign X <1341398182@qq.com>"]
license = "MIT"
description = "A lightweight, no_std ECS-driven UI framework for embedded, desktop, and WebAssembly"
repository = "https://github.com/W-Mai/mirui"
homepage = "https://github.com/W-Mai/mirui"
documentation = "https://docs.rs/mirui"
readme = "README.md"
keywords = ["ui", "gui", "ecs", "embedded", "no-std"]
categories = ["gui", "embedded"]
rust-version = "1.85"

[workspace]
members = [".", "xtask"]

[dependencies]

[features]
default = []
sdl = ["dep:sdl2"]

[dependencies.sdl2]
version = "0.37"
optional = true

[dev-dependencies]
sdl2 = "0.37"

[[example]]
name = "app_demo"
required-features = ["sdl"]

[[example]]
name = "click_demo"
required-features = ["sdl"]

[[example]]
name = "rounded_demo"
required-features = ["sdl"]

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
panic = "abort"
