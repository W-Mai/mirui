<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>mirui — gallery</title>
    <link data-trunk rel="rust" data-wasm-opt="z" data-wasm-opt-params="--all-features" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #0d1117;
        --bg-soft: #161b22;
        --bg-hover: #21262d;
        --bg-code: #0a0e14;
        --border: #30363d;
        --border-soft: #21262d;
        --text: #c9d1d9;
        --text-dim: #8b949e;
        --accent: #58a6ff;
        --accent-on: #0d1117;
        --cat-color: #f0883e;
        --shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        --shadow-ring: 0 0 0 4px rgba(88, 166, 255, 0.18);
        /* Rust syntax tokens */
        --syn-kw: #ff7b72;
        --syn-str: #a5d6ff;
        --syn-num: #79c0ff;
        --syn-com: #6e7681;
        --syn-mac: #d2a8ff;
        --syn-type: #ffa657;
        --syn-attr: #7ee787;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", system-ui, sans-serif;
      }
      .layout {
        display: grid;
        grid-template-columns: 280px 1fr;
        height: 100%;
      }
      aside {
        background: var(--bg-soft);
        border-right: 1px solid var(--border);
        overflow-y: auto;
        padding: 16px 0;
      }
      .brand {
        padding: 0 20px 16px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 8px;
      }
      .brand h1 {
        font-size: 18px;
        margin: 0;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      .brand .ver {
        color: var(--text-dim);
        font-size: 12px;
        margin-top: 2px;
      }
      .brand a {
        color: var(--accent);
        text-decoration: none;
      }
      #nav { padding: 0 8px; }
      .cat {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--cat-color);
        padding: 12px 12px 6px;
        margin: 0;
      }
      .cat-row {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      #nav a {
        display: block;
        padding: 6px 12px;
        font-size: 13px;
        color: var(--text);
        text-decoration: none;
        border-radius: 6px;
        transition: background 0.1s;
      }
      #nav a:hover { background: var(--bg-hover); }
      #nav a.active {
        background: var(--accent);
        color: var(--accent-on);
        font-weight: 500;
      }

      main {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        overflow: auto;
        gap: 24px;
        flex-wrap: wrap;
        align-content: center;
      }

      /* ── Stage ─────────────────────────────────────────────── */
      .stage-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        flex: 0 0 auto;
      }
      .stage {
        position: relative;
        background: var(--bg-soft);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 16px;
        box-shadow: var(--shadow);
      }
      .stage.resizing {
        border-color: var(--accent);
        box-shadow: var(--shadow), var(--shadow-ring);
      }
      .stage-meta {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 12px;
        gap: 16px;
      }
      .stage-meta .name {
        font-size: 14px;
        font-weight: 500;
      }
      .stage-meta .size {
        font-size: 12px;
        color: var(--text-dim);
        font-feature-settings: "tnum";
        font-variant-numeric: tabular-nums;
      }
      #mirui {
        display: block;
        background: var(--bg);
        border-radius: 4px;
        touch-action: none;
        outline: none;
      }

      /* ── Resize ring (bottom-right corner) ─────────────────── */
      .resize-ring {
        position: absolute;
        right: -9px;
        bottom: -9px;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: var(--bg-soft);
        border: 2px solid var(--accent);
        cursor: nwse-resize;
        touch-action: none;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.45);
        transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
        z-index: 3;
      }
      .resize-ring::after {
        content: "";
        width: 7px;
        height: 7px;
        border-right: 2px solid var(--accent);
        border-bottom: 2px solid var(--accent);
        transform: translate(-1px, -1px);
        opacity: 0.85;
      }
      .resize-ring:hover {
        transform: scale(1.12);
        background: var(--bg-hover);
      }
      .stage.resizing .resize-ring {
        background: var(--accent);
        box-shadow: var(--shadow-ring);
        transform: scale(1.18);
      }
      .stage.resizing .resize-ring::after {
        border-color: var(--accent-on);
      }

      /* ── Code panel ────────────────────────────────────────── */
      .code-panel {
        display: flex;
        flex-direction: column;
        background: var(--bg-soft);
        border: 1px solid var(--border);
        border-radius: 8px;
        box-shadow: var(--shadow);
        width: 540px;
        max-width: 100%;
        max-height: min(78vh, 720px);
        overflow: hidden;
        flex: 1 1 420px;
      }
      .code-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        background: var(--bg-soft);
      }
      .code-head .title {
        font-size: 12px;
        font-weight: 600;
        color: var(--text-dim);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .code-head .title b {
        color: var(--text);
        font-weight: 600;
        text-transform: none;
        letter-spacing: 0;
      }
      .copy-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        flex: 0 0 auto;
        font: inherit;
        font-size: 12px;
        font-weight: 500;
        color: var(--text);
        background: var(--bg-hover);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 5px 11px;
        cursor: pointer;
        transition: background 0.1s, border-color 0.1s, color 0.1s;
      }
      .copy-btn:hover {
        background: var(--border-soft);
        border-color: var(--text-dim);
      }
      .copy-btn:active { transform: translateY(1px); }
      .copy-btn.copied {
        color: var(--syn-attr);
        border-color: var(--syn-attr);
        background: rgba(126, 231, 135, 0.08);
      }
      .copy-btn svg { display: block; }

      .code-body {
        margin: 0;
        overflow: auto;
        background: var(--bg-code);
        flex: 1 1 auto;
      }
      .code-body pre {
        margin: 0;
        padding: 14px 16px 18px;
        font-family: ui-monospace, "SF Mono", "JetBrains Mono", "Fira Code", "Cascadia Code", Menlo, Consolas, monospace;
        font-size: 12.5px;
        line-height: 1.65;
        color: var(--text);
        tab-size: 4;
        white-space: pre;
      }
      .code-body code { font: inherit; }
      .code-empty {
        padding: 24px 16px;
        color: var(--text-dim);
        font-size: 13px;
      }

      /* Rust syntax token colours */
      .tok-kw   { color: var(--syn-kw); }
      .tok-str  { color: var(--syn-str); }
      .tok-num  { color: var(--syn-num); }
      .tok-com  { color: var(--syn-com); font-style: italic; }
      .tok-mac  { color: var(--syn-mac); }
      .tok-type { color: var(--syn-type); }
      .tok-attr { color: var(--syn-attr); }

      /* thin scrollbars for the code panel */
      .code-body::-webkit-scrollbar { width: 10px; height: 10px; }
      .code-body::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 6px;
        border: 2px solid var(--bg-code);
      }
      .code-body::-webkit-scrollbar-thumb:hover { background: #444c56; }

      @media (max-width: 720px) {
        .layout {
          grid-template-columns: 1fr;
          grid-template-rows: auto 1fr;
        }
        aside {
          border-right: none;
          border-bottom: 1px solid var(--border);
          max-height: 35vh;
        }
        main {
          padding: 16px 8px;
          gap: 16px;
          align-items: flex-start;
        }
        .code-panel { width: 100%; flex-basis: auto; }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside>
        <div class="brand">
          <h1>mirui</h1>
          <div class="ver"><a href="https://github.com/W-Mai/mirui" target="_blank" rel="noopener">github · W-Mai/mirui</a></div>
        </div>
        <div id="nav"></div>
      </aside>
      <main>
        <div class="stage-wrap">
          <div class="stage" id="stage">
            <div class="stage-meta">
              <span class="name" id="stage-name">—</span>
              <span class="size" id="stage-size">—</span>
            </div>
            <canvas id="mirui" tabindex="0"></canvas>
            <div class="resize-ring" id="resize-ring" title="Drag to resize"></div>
          </div>
        </div>
        <div class="code-panel" id="code-panel">
          <div class="code-head">
            <span class="title">source · <b id="code-title">—</b></span>
            <button class="copy-btn" id="copy-btn" type="button" aria-label="Copy source">
              <svg width="13" height="13" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <rect x="5.5" y="5.5" width="8" height="9" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
                <path d="M3.5 10.5H3a1.5 1.5 0 0 1-1.5-1.5V3A1.5 1.5 0 0 1 3 1.5h6A1.5 1.5 0 0 1 10.5 3v.5" stroke="currentColor" stroke-width="1.4"/>
              </svg>
              <span class="label">Copy</span>
            </button>
          </div>
          <div class="code-body" id="code-body">
            <pre><code id="code"></code></pre>
          </div>
        </div>
      </main>
    </div>
    <script>
      window.addEventListener("TrunkApplicationStarted", () => {
        const params = new URLSearchParams(location.search);
        const activeSlug = params.get("demo") || "dsl";

        const navEl = document.getElementById("nav");
        navEl.innerHTML = wasmBindings.nav_html();

        let activeLink = null;
        for (const link of navEl.querySelectorAll("a")) {
          if (link.dataset.demo === activeSlug) {
            link.classList.add("active");
            activeLink = link;
          }
        }

        const canvas = document.getElementById("mirui");
        const stage = document.getElementById("stage");
        const stageName = document.getElementById("stage-name");
        const stageSize = document.getElementById("stage-size");

        // ── Canvas sizing ──────────────────────────────────────
        // mirui re-reads the viewport each frame, so changing both the
        // attribute size and the CSS size is all that's needed; the wasm
        // render loop picks up the new dimensions on its own.
        const MIN_SIZE = 120;
        // Only the CSS box is ours; the wasm surface re-reads clientWidth
        // each frame and owns canvas.width/height (logical × DPR). Writing
        // the attributes here would fight that sync and blank the backing
        // store mid-drag.
        function applyCanvasSize(w, h) {
          w = Math.round(w);
          h = Math.round(h);
          canvas.style.width = `${w}px`;
          canvas.style.height = `${h}px`;
          stageSize.textContent = `${w} × ${h}`;
        }

        let initW = 480;
        let initH = 320;
        if (activeLink) {
          stageName.textContent = activeLink.textContent;
          const w = parseInt(activeLink.dataset.w, 10);
          const h = parseInt(activeLink.dataset.h, 10);
          if (Number.isFinite(w) && Number.isFinite(h)) {
            initW = w;
            initH = h;
          }
          activeLink.scrollIntoView({ block: "nearest" });
        }
        applyCanvasSize(initW, initH);

        // ── Resize ring ────────────────────────────────────────
        // Center-scaling: <main> already flex-centers the stage, so growing
        // the canvas symmetrically keeps it centered. The ring extends
        // outward from the bottom-right corner; we track pointer delta and
        // clamp to [MIN_SIZE, viewport bounds].
        const ring = document.getElementById("resize-ring");
        let resizing = false;
        let startX = 0;
        let startY = 0;
        let startW = 0;
        let startH = 0;

        ring.addEventListener("pointerdown", (e) => {
          e.preventDefault();
          resizing = true;
          startX = e.clientX;
          startY = e.clientY;
          const r = canvas.getBoundingClientRect();
          startW = r.width;
          startH = r.height;
          stage.classList.add("resizing");
          ring.setPointerCapture(e.pointerId);
        });

        ring.addEventListener("pointermove", (e) => {
          if (!resizing) return;
          const maxW = Math.max(MIN_SIZE, window.innerWidth - 80);
          const maxH = Math.max(MIN_SIZE, window.innerHeight - 80);
          const nextW = Math.min(maxW, Math.max(MIN_SIZE, startW + (e.clientX - startX)));
          const nextH = Math.min(maxH, Math.max(MIN_SIZE, startH + (e.clientY - startY)));
          applyCanvasSize(nextW, nextH);
        });

        function endResize(e) {
          if (!resizing) return;
          resizing = false;
          stage.classList.remove("resizing");
          if (e && ring.hasPointerCapture(e.pointerId)) {
            ring.releasePointerCapture(e.pointerId);
          }
        }
        ring.addEventListener("pointerup", endResize);
        ring.addEventListener("pointercancel", endResize);

        // ── Code panel ─────────────────────────────────────────
        const codeEl = document.getElementById("code");
        const codeBody = document.getElementById("code-body");
        const codeTitle = document.getElementById("code-title");
        const copyBtn = document.getElementById("copy-btn");
        const copyLabel = copyBtn.querySelector(".label");

        const RUST_KEYWORDS = new Set([
          "as", "async", "await", "break", "const", "continue", "crate", "dyn",
          "else", "enum", "extern", "false", "fn", "for", "if", "impl", "in",
          "let", "loop", "match", "mod", "move", "mut", "pub", "ref", "return",
          "self", "Self", "static", "struct", "super", "trait", "true", "type",
          "union", "unsafe", "use", "where", "while",
        ]);

        function escapeHtml(s) {
          return s.replace(/[&<>]/g, (c) => (c === "&" ? "&amp;" : c === "<" ? "&lt;" : "&gt;"));
        }

        // Tiny single-pass Rust highlighter. Walks the source char by char,
        // peeling off comments / strings / chars / attributes / numbers /
        // macros / identifiers, and wraps each token in a span. Working on
        // raw text (not HTML) keeps the matcher simple; we escape only the
        // captured slice when emitting.
        function highlightRust(src) {
          let out = "";
          let i = 0;
          const n = src.length;
          const isIdentStart = (c) => /[A-Za-z_]/.test(c);
          const isIdent = (c) => /[A-Za-z0-9_]/.test(c);

          while (i < n) {
            const c = src[i];
            const c2 = src[i + 1];

            // line comment
            if (c === "/" && c2 === "/") {
              let j = i + 2;
              while (j < n && src[j] !== "\n") j++;
              out += `<span class="tok-com">${escapeHtml(src.slice(i, j))}</span>`;
              i = j;
              continue;
            }
            // block comment (nested-aware)
            if (c === "/" && c2 === "*") {
              let j = i + 2;
              let depth = 1;
              while (j < n && depth > 0) {
                if (src[j] === "/" && src[j + 1] === "*") { depth++; j += 2; }
                else if (src[j] === "*" && src[j + 1] === "/") { depth--; j += 2; }
                else j++;
              }
              out += `<span class="tok-com">${escapeHtml(src.slice(i, j))}</span>`;
              i = j;
              continue;
            }
            // string literal (with escapes)
            if (c === '"') {
              let j = i + 1;
              while (j < n) {
                if (src[j] === "\\") { j += 2; continue; }
                if (src[j] === '"') { j++; break; }
                j++;
              }
              out += `<span class="tok-str">${escapeHtml(src.slice(i, j))}</span>`;
              i = j;
              continue;
            }
            // char literal or lifetime — disambiguate by closing quote
            if (c === "'") {
              let j = i + 1;
              if (src[j] === "\\") j += 2;
              else j += 1;
              if (src[j] === "'") {
                // char literal
                out += `<span class="tok-str">${escapeHtml(src.slice(i, j + 1))}</span>`;
                i = j + 1;
              } else {
                // lifetime — emit the apostrophe, let ident run handle the rest
                out += escapeHtml(c);
                i += 1;
              }
              continue;
            }
            // attribute  #[...]  or  #![...]
            if (c === "#" && (c2 === "[" || c2 === "!")) {
              let j = i + 1;
              if (src[j] === "!") j++;
              if (src[j] === "[") {
                let depth = 0;
                while (j < n) {
                  if (src[j] === "[") depth++;
                  else if (src[j] === "]") { depth--; j++; if (depth === 0) break; continue; }
                  j++;
                }
                out += `<span class="tok-attr">${escapeHtml(src.slice(i, j))}</span>`;
                i = j;
                continue;
              }
            }
            // number
            if (/[0-9]/.test(c)) {
              let j = i + 1;
              while (j < n && /[0-9a-fA-FxXoObB_.eE]/.test(src[j])) j++;
              out += `<span class="tok-num">${escapeHtml(src.slice(i, j))}</span>`;
              i = j;
              continue;
            }
            // identifier / keyword / macro / type
            if (isIdentStart(c)) {
              let j = i + 1;
              while (j < n && isIdent(src[j])) j++;
              const word = src.slice(i, j);
              if (src[j] === "!") {
                // macro invocation:  ui!  vec!  println!
                out += `<span class="tok-mac">${escapeHtml(word)}!</span>`;
                i = j + 1;
              } else if (RUST_KEYWORDS.has(word)) {
                out += `<span class="tok-kw">${escapeHtml(word)}</span>`;
                i = j;
              } else if (/^[A-Z]/.test(word)) {
                // PascalCase → treat as type / variant
                out += `<span class="tok-type">${escapeHtml(word)}</span>`;
                i = j;
              } else {
                out += escapeHtml(word);
                i = j;
              }
              continue;
            }
            // plain char
            out += escapeHtml(c);
            i += 1;
          }
          return out;
        }

        let rawSource = "";
        try {
          rawSource = wasmBindings.demo_source(activeSlug) || "";
        } catch (err) {
          rawSource = "";
        }
        codeTitle.textContent = `${activeSlug}.rs`;
        if (rawSource) {
          codeEl.innerHTML = highlightRust(rawSource);
        } else {
          codeBody.innerHTML = `<div class="code-empty">No source available for <code>${escapeHtml(activeSlug)}</code>.</div>`;
          copyBtn.disabled = true;
        }

        let copyResetTimer = null;
        copyBtn.addEventListener("click", async () => {
          if (!rawSource) return;
          try {
            await navigator.clipboard.writeText(rawSource);
          } catch (err) {
            // Fallback for non-secure contexts where the Clipboard API is gated.
            const ta = document.createElement("textarea");
            ta.value = rawSource;
            ta.style.position = "fixed";
            ta.style.opacity = "0";
            document.body.appendChild(ta);
            ta.select();
            try { document.execCommand("copy"); } catch (_) {}
            document.body.removeChild(ta);
          }
          copyBtn.classList.add("copied");
          copyLabel.textContent = "Copied!";
          clearTimeout(copyResetTimer);
          copyResetTimer = setTimeout(() => {
            copyBtn.classList.remove("copied");
            copyLabel.textContent = "Copy";
          }, 1400);
        });
      });
    </script>
  </body>
</html>
