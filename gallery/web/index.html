<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>mirui — gallery</title>
    <link data-trunk rel="rust" data-wasm-opt="z" data-wasm-opt-params="--all-features" />
    <style>
      /* ════════════════════════════════════════════════════════════
         mirui gallery — one instrument, three panes.

         The whole page is a single tool shell: a top status rail spans
         everything, then a flush three-column body (navigator · stage ·
         source) seamed by shared hairlines — no floating widgets. One
         signal colour (cyan); everything else is neutral graphite so the
         live canvas and the accent rail are the only things that glow.
         ════════════════════════════════════════════════════════════ */
      :root {
        color-scheme: dark;

        /* ── Graphite surface ladder (back → front) ── */
        --bg:        #090b0f;   /* app shell base                     */
        --panel:     #0e1116;   /* navigator + source bodies          */
        --panel-2:   #12161d;   /* rails, heads, sunken fields        */
        --raised:    #171c25;   /* stage card, controls               */
        --raised-2:  #1f2632;   /* control hover                      */
        --well:      #06080b;   /* code well + canvas backdrop        */

        /* ── Hairlines ── */
        --line:        #20262f; /* primary seam between panes          */
        --line-soft:   #161b22; /* faint inner divider                 */
        --line-strong: #303845; /* emphasised / focused edge           */

        /* ── Ink ── */
        --ink:       #e3e8ee;   /* primary text                        */
        --ink-dim:   #9aa4b2;   /* secondary text                      */
        --ink-faint: #616c7b;   /* tertiary / placeholder / metadata   */

        /* ── The one signal ── */
        --signal:        #46e5d0; /* cyan accent                       */
        --signal-bright: #7df4e4;
        --signal-deep:   #1b8a7d;
        --signal-on:     #04130f; /* ink on a signal fill              */
        --signal-wash:   rgba(70, 229, 208, 0.10);
        --signal-edge:   rgba(70, 229, 208, 0.42);
        --signal-glow:   rgba(70, 229, 208, 0.22);

        /* warm marker reserved for the live/recording dot only */
        --live: #46e5d0;
        --good: #7bdcff;

        /* ── Spacing scale (4px base) ── */
        --s1: 4px;  --s2: 8px;  --s3: 12px; --s4: 16px;
        --s5: 20px; --s6: 24px; --s7: 32px; --s8: 44px;

        /* ── Radius scale ── */
        --r1: 5px;  --r2: 7px;  --r3: 10px; --r4: 14px; --r-pill: 999px;

        /* ── Elevation — only the hero stage earns the big lift ── */
        --lift-hero: 0 1px 0 rgba(255,255,255,0.03) inset,
                     0 24px 60px -28px rgba(0,0,0,0.85),
                     0 4px 14px rgba(0,0,0,0.4);
        --lift-pop:  0 2px 8px rgba(0,0,0,0.5);
        --ring:      0 0 0 1px var(--signal-edge), 0 0 0 6px var(--signal-glow);

        /* ── Type ── */
        --font-ui:   -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", system-ui, sans-serif;
        --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", "Fira Code", "Cascadia Code", Menlo, Consolas, monospace;

        /* ── Rust syntax — one violet pop for macros, rest tuned neutral ── */
        --syn-kw:   #ff8a7a;
        --syn-str:  #8fe6c9;
        --syn-num:  #f3c177;
        --syn-com:  #5a6573;
        --syn-mac:  #b3a7ff;
        --syn-type: #7df4e4;
        --syn-attr: #8fd98a;
      }

      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--ink);
        font-family: var(--font-ui);
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }

      /* ── Shell: one status rail over a flush three-pane body ── */
      .layout {
        display: grid;
        grid-template-rows: auto 1fr;
        height: 100%;
        background:
          radial-gradient(120% 80% at 18% -10%, rgba(70,229,208,0.05) 0%, transparent 55%),
          var(--bg);
      }

      /* ══════════════════════════════════════════════════════════
         TOP — status rail spanning the whole instrument
         ══════════════════════════════════════════════════════════ */
      .topbar {
        display: flex;
        align-items: center;
        gap: var(--s4);
        height: 52px;
        padding: 0 var(--s5) 0 var(--s4);
        border-bottom: 1px solid var(--line);
        background:
          linear-gradient(180deg, var(--panel-2) 0%, var(--panel) 100%);
      }
      .brand-row {
        display: flex;
        align-items: center;
        gap: var(--s3);
        flex: 0 0 auto;
        min-width: 0;
      }
      .brand-mark {
        flex: 0 0 auto;
        width: 28px;
        height: 28px;
        border-radius: var(--r2);
        display: grid;
        place-items: center;
        background: linear-gradient(150deg, var(--signal) 0%, var(--signal-deep) 130%);
        box-shadow: 0 2px 12px -3px var(--signal-glow), 0 0 0 1px rgba(255,255,255,0.08) inset;
      }
      .brand-mark svg { display: block; }
      .brand-text { min-width: 0; line-height: 1; }
      .brand-text h1 {
        font-size: 15px;
        margin: 0;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: var(--ink);
      }
      .brand-text .tag {
        margin-top: 3px;
        font-size: 10.5px;
        font-family: var(--font-mono);
        color: var(--ink-faint);
        letter-spacing: 0.01em;
      }
      .topbar-spacer { flex: 1 1 auto; }
      .topbar .gh {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        font-size: 12px;
        font-weight: 500;
        color: var(--ink-dim);
        text-decoration: none;
        padding: 5px 11px 5px 9px;
        border: 1px solid var(--line);
        border-radius: var(--r-pill);
        background: var(--panel-2);
        transition: color 0.13s, border-color 0.13s, background 0.13s;
        flex: 0 0 auto;
      }
      .topbar .gh svg { display: block; opacity: 0.85; }
      .topbar .gh:hover {
        color: var(--ink);
        border-color: var(--line-strong);
        background: var(--raised);
      }
      /* live indicator — the canvas is rendering each frame */
      .live-chip {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        font-size: 10.5px;
        font-family: var(--font-mono);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ink-dim);
        flex: 0 0 auto;
      }
      .live-chip .dot {
        width: 7px;
        height: 7px;
        border-radius: var(--r-pill);
        background: var(--live);
        box-shadow: 0 0 0 0 var(--signal-glow);
        animation: pulse 2.4s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { box-shadow: 0 0 0 0 rgba(70,229,208,0.45); }
        50%      { box-shadow: 0 0 0 5px rgba(70,229,208,0); }
      }
      @media (prefers-reduced-motion: reduce) {
        .live-chip .dot { animation: none; }
      }

      /* ══════════════════════════════════════════════════════════
         BODY — flush three panes: navigator · stage · source
         ══════════════════════════════════════════════════════════ */
      .body {
        display: grid;
        grid-template-columns: 276px 1fr;
        min-height: 0;
        overflow: hidden;
      }

      /* ── LEFT: the navigator (the first-class demo selector) ── */
      aside {
        position: relative;
        display: flex;
        flex-direction: column;
        min-height: 0;
        border-right: 1px solid var(--line);
        background: var(--panel);
      }

      /* sticky filter field — client-side over the nav <a> nodes */
      .nav-search {
        flex: 0 0 auto;
        position: relative;
        padding: var(--s4) var(--s4) var(--s3);
        border-bottom: 1px solid var(--line-soft);
        background: var(--panel);
      }
      .nav-search svg.glass {
        position: absolute;
        left: calc(var(--s4) + 11px);
        top: calc(var(--s4) + 9px);
        color: var(--ink-faint);
        pointer-events: none;
      }
      .nav-search input {
        width: 100%;
        font: inherit;
        font-size: 13px;
        color: var(--ink);
        background: var(--well);
        border: 1px solid var(--line);
        border-radius: var(--r2);
        padding: 8px 30px 8px 32px;
        outline: none;
        transition: border-color 0.13s, box-shadow 0.13s, background 0.13s;
      }
      .nav-search input::placeholder { color: var(--ink-faint); }
      .nav-search input:focus {
        border-color: var(--signal-edge);
        background: var(--bg);
        box-shadow: 0 0 0 3px var(--signal-glow);
      }
      .nav-search .clear {
        position: absolute;
        right: calc(var(--s4) + 7px);
        top: calc(var(--s4) + 7px);
        width: 18px;
        height: 18px;
        border: 0;
        padding: 0;
        border-radius: var(--r-pill);
        display: none;
        place-items: center;
        cursor: pointer;
        color: var(--ink-faint);
        background: var(--raised);
        transition: color 0.13s, background 0.13s;
      }
      .nav-search .clear svg { display: block; }
      .nav-search .clear:hover { color: var(--ink); background: var(--raised-2); }
      .nav-search.has-text .clear { display: grid; }

      /* scrollable list */
      #nav {
        flex: 1 1 auto;
        min-height: 0;
        overflow-y: auto;
        overscroll-behavior: contain;
        padding: var(--s2) var(--s3) var(--s6) var(--s4);
      }
      #nav::-webkit-scrollbar { width: 11px; }
      #nav::-webkit-scrollbar-thumb {
        background: var(--line);
        border-radius: var(--r-pill);
        border: 3px solid transparent;
        background-clip: padding-box;
      }
      #nav::-webkit-scrollbar-thumb:hover { background: var(--line-strong); background-clip: padding-box; }

      /* category header — quiet neutral eyebrow + count, no warm accent */
      .cat {
        display: flex;
        align-items: center;
        gap: var(--s2);
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.13em;
        color: var(--ink-faint);
        padding: var(--s5) var(--s2) var(--s2) 0;
        margin: 0;
        position: sticky;
        top: 0;
        z-index: 2;
        background: linear-gradient(180deg, var(--panel) 74%, transparent 100%);
      }
      .cat:first-child { padding-top: var(--s3); }
      .cat::after {
        content: attr(data-count);
        margin-left: auto;
        font-family: var(--font-mono);
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0;
        color: var(--ink-faint);
        background: var(--panel-2);
        border: 1px solid var(--line-soft);
        border-radius: var(--r-pill);
        padding: 1px 7px;
        min-width: 20px;
        text-align: center;
      }
      .cat:not([data-count])::after { content: none; }

      /* the rail: every row group is threaded on one continuous guide line */
      .cat-row {
        position: relative;
        display: flex;
        flex-direction: column;
        gap: 1px;
        padding: 2px 0 var(--s2) 0;
      }
      .cat-row::before {
        content: "";
        position: absolute;
        left: 4px;
        top: 4px;
        bottom: calc(var(--s2) + 2px);
        width: 1.5px;
        border-radius: var(--r-pill);
        background: var(--line);
      }

      #nav a {
        position: relative;
        display: flex;
        align-items: center;
        padding: 7px var(--s3) 7px 22px;
        font-size: 13px;
        line-height: 1.3;
        color: var(--ink-dim);
        text-decoration: none;
        border-radius: var(--r2);
        transition: background 0.13s, color 0.13s;
      }
      /* node on the rail — quiet by default, snaps bright when active */
      #nav a::before {
        content: "";
        position: absolute;
        left: 1.25px;
        top: 50%;
        width: 7px;
        height: 7px;
        margin-top: -3.5px;
        border-radius: var(--r-pill);
        background: var(--line-strong);
        box-shadow: 0 0 0 3px var(--panel);
        transition: background 0.13s, box-shadow 0.13s, transform 0.13s;
      }
      #nav a:hover {
        background: var(--panel-2);
        color: var(--ink);
      }
      #nav a:hover::before { background: var(--ink-faint); }
      #nav a.active {
        background: var(--signal-wash);
        color: var(--signal-bright);
        font-weight: 600;
      }
      /* active row anchors a bright bar onto the rail */
      #nav a.active::after {
        content: "";
        position: absolute;
        left: 3.5px;
        top: 6px;
        bottom: 6px;
        width: 2.5px;
        border-radius: var(--r-pill);
        background: linear-gradient(180deg, var(--signal-bright), var(--signal));
        box-shadow: 0 0 10px var(--signal-glow);
      }
      #nav a.active::before {
        background: var(--signal);
        box-shadow: 0 0 0 3px var(--panel), 0 0 9px var(--signal-glow);
        transform: scale(1.08);
      }
      #nav a.filter-hit { color: var(--ink); }
      #nav a[hidden] { display: none; }
      .cat[hidden], .cat-row[hidden] { display: none; }
      .nav-empty {
        display: none;
        padding: var(--s7) var(--s3);
        text-align: center;
        color: var(--ink-faint);
        font-size: 12.5px;
        font-family: var(--font-mono);
      }
      #nav.is-empty .nav-empty { display: block; }

      /* ── CENTER + RIGHT: the workbench ── */
      main {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: var(--s7);
        overflow: auto;
        gap: var(--s7);
        flex-wrap: wrap;
        align-content: center;
        background:
          radial-gradient(78% 56% at 32% 4%, rgba(70,229,208,0.045) 0%, transparent 58%),
          radial-gradient(64% 56% at 100% 100%, rgba(125,244,228,0.03) 0%, transparent 55%),
          var(--bg);
      }

      /* ── Stage — the hero. The only element with real elevation. ── */
      .stage-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        flex: 0 0 auto;
      }
      .stage {
        position: relative;
        background:
          linear-gradient(180deg, var(--raised) 0%, var(--panel-2) 100%);
        border: 1px solid var(--line-strong);
        border-radius: var(--r4);
        padding: var(--s4);
        box-shadow: var(--lift-hero);
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }
      .stage.resizing {
        border-color: var(--signal-edge);
        box-shadow: var(--lift-hero), var(--ring);
      }
      .stage-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: var(--s3);
        gap: var(--s4);
      }
      .stage-meta .name {
        display: inline-flex;
        align-items: center;
        gap: var(--s2);
        font-size: 14px;
        font-weight: 600;
        letter-spacing: -0.01em;
        color: var(--ink);
        min-width: 0;
      }
      .stage-meta .name::before {
        content: "";
        flex: 0 0 auto;
        width: 7px;
        height: 7px;
        border-radius: var(--r-pill);
        background: var(--signal);
        box-shadow: 0 0 9px var(--signal-glow);
      }
      .stage-meta .meta-right {
        display: inline-flex;
        align-items: center;
        gap: var(--s2);
        flex: 0 0 auto;
      }
      .stage-meta .size {
        font-size: 12px;
        font-family: var(--font-mono);
        color: var(--ink-dim);
        background: var(--well);
        border: 1px solid var(--line-soft);
        border-radius: var(--r1);
        padding: 4px 9px;
        font-variant-numeric: tabular-nums;
      }

      /* one control family across stage + source head (reset · eye · copy) */
      .icon-btn,
      .copy-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
        flex: 0 0 auto;
        font: inherit;
        font-size: 12px;
        font-weight: 500;
        color: var(--ink-dim);
        background: var(--raised);
        border: 1px solid var(--line);
        border-radius: var(--r1);
        cursor: pointer;
        transition: background 0.13s, border-color 0.13s, color 0.13s, transform 0.06s;
      }
      .icon-btn { padding: 6px 8px; }
      .copy-btn { color: var(--ink); padding: 6px 12px; gap: 6px; }
      .icon-btn:hover,
      .copy-btn:hover {
        background: var(--raised-2);
        border-color: var(--line-strong);
        color: var(--ink);
      }
      .icon-btn:active,
      .copy-btn:active { transform: translateY(1px); }
      .icon-btn svg,
      .copy-btn svg { display: block; }
      .icon-btn.on {
        color: var(--signal-bright);
        border-color: var(--signal-edge);
        background: var(--signal-wash);
      }
      .copy-btn.copied {
        color: var(--signal-on);
        border-color: var(--signal);
        background: var(--signal);
      }
      .icon-btn:disabled,
      .copy-btn:disabled { opacity: 0.4; cursor: default; }

      #mirui {
        display: block;
        background: var(--well);
        border-radius: var(--r2);
        box-shadow: 0 0 0 1px var(--line-soft) inset;
        touch-action: none;
        outline: none;
      }

      /* ── Resize ring (bottom-right corner) ── */
      .resize-ring {
        position: absolute;
        right: -9px;
        bottom: -9px;
        width: 22px;
        height: 22px;
        border-radius: var(--r-pill);
        background: var(--raised);
        border: 2px solid var(--signal);
        cursor: nwse-resize;
        touch-action: none;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: var(--lift-pop);
        transition: transform 0.13s ease, box-shadow 0.13s ease, background 0.13s ease;
        z-index: 3;
      }
      .resize-ring::after {
        content: "";
        width: 7px;
        height: 7px;
        border-right: 2px solid var(--signal);
        border-bottom: 2px solid var(--signal);
        transform: translate(-1px, -1px);
        opacity: 0.9;
      }
      .resize-ring:hover {
        transform: scale(1.12);
        background: var(--raised-2);
      }
      .stage.resizing .resize-ring {
        background: var(--signal);
        box-shadow: var(--ring);
        transform: scale(1.18);
      }
      .stage.resizing .resize-ring::after {
        border-color: var(--signal-on);
      }

      /* ── Source panel — docked reference, flush card, no float lift ── */
      .code-panel {
        display: flex;
        flex-direction: column;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: var(--r4);
        box-shadow: var(--lift-pop);
        width: 540px;
        max-width: 100%;
        max-height: min(78vh, 720px);
        overflow: hidden;
        flex: 1 1 420px;
      }
      .code-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--s3);
        padding: var(--s3) var(--s3) var(--s3) var(--s4);
        border-bottom: 1px solid var(--line);
        background: var(--panel-2);
      }
      .code-head .actions {
        display: inline-flex;
        align-items: center;
        gap: var(--s2);
        flex: 0 0 auto;
      }
      .code-head .title {
        display: inline-flex;
        align-items: baseline;
        gap: 7px;
        font-size: 10.5px;
        font-weight: 700;
        color: var(--ink-faint);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .code-head .title b {
        color: var(--ink);
        font-family: var(--font-mono);
        font-weight: 600;
        font-size: 12px;
        text-transform: none;
        letter-spacing: 0;
      }

      .code-body {
        margin: 0;
        overflow: auto;
        background: var(--well);
        flex: 1 1 auto;
      }
      .code-body pre {
        margin: 0;
        padding: var(--s4) var(--s4) var(--s5);
        font-family: var(--font-mono);
        font-size: 12.5px;
        line-height: 1.66;
        color: var(--ink);
        tab-size: 4;
        white-space: pre;
      }
      .code-body code { font: inherit; }
      .code-empty {
        padding: var(--s7) var(--s4);
        color: var(--ink-dim);
        font-size: 13px;
        font-family: var(--font-mono);
      }
      .code-empty code { color: var(--signal-bright); }

      /* Rust syntax token colours */
      .tok-kw   { color: var(--syn-kw); }
      .tok-str  { color: var(--syn-str); }
      .tok-num  { color: var(--syn-num); }
      .tok-com  { color: var(--syn-com); font-style: italic; }
      .tok-mac  { color: var(--syn-mac); }
      .tok-type { color: var(--syn-type); }
      .tok-attr { color: var(--syn-attr); }

      .code-body::-webkit-scrollbar { width: 11px; height: 11px; }
      .code-body::-webkit-scrollbar-thumb {
        background: var(--line);
        border-radius: var(--r-pill);
        border: 2px solid var(--well);
      }
      .code-body::-webkit-scrollbar-thumb:hover { background: var(--line-strong); }

      @media (max-width: 760px) {
        .body {
          grid-template-columns: 1fr;
          grid-template-rows: auto 1fr;
        }
        aside {
          border-right: none;
          border-bottom: 1px solid var(--line);
          max-height: 40vh;
        }
        .topbar { height: 48px; padding: 0 var(--s4); gap: var(--s3); }
        .live-chip { display: none; }
        main {
          padding: var(--s5) var(--s3);
          gap: var(--s5);
          align-items: flex-start;
        }
        .code-panel { width: 100%; flex-basis: auto; }
      }
      @media (max-width: 420px) {
        .topbar .gh span.gh-label { display: none; }
        .topbar .gh { padding: 5px 9px; }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <header class="topbar">
        <div class="brand-row">
          <span class="brand-mark" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <path d="M4 18V8.5L8.5 13 13 8.5V18" stroke="#04130f" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M17.5 7v11" stroke="#04130f" stroke-width="2.4" stroke-linecap="round"/>
              <circle cx="17.5" cy="6.2" r="0.4" fill="#04130f" stroke="#04130f" stroke-width="1.6"/>
            </svg>
          </span>
          <span class="brand-text">
            <h1>mirui · gallery</h1>
            <div class="tag">subpixel UI · no_std · wasm</div>
          </span>
        </div>
        <div class="topbar-spacer"></div>
        <span class="live-chip" aria-hidden="true"><span class="dot"></span>rendering</span>
        <a class="gh" href="https://github.com/W-Mai/mirui" target="_blank" rel="noopener">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <path d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.6 7.6 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/>
          </svg>
          <span class="gh-label">W-Mai/mirui</span>
        </a>
      </header>
      <div class="body">
        <aside>
          <div class="nav-search">
            <svg class="glass" width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <circle cx="7" cy="7" r="4.5" stroke="currentColor" stroke-width="1.5"/>
              <path d="M10.5 10.5 14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <input id="nav-filter" type="text" placeholder="Filter demos…" autocomplete="off" spellcheck="false" aria-label="Filter demos" />
            <button class="clear" id="nav-filter-clear" type="button" title="Clear filter" aria-label="Clear filter">
              <svg width="11" height="11" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                <path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
          <div id="nav">
            <div class="nav-empty">No demos match that filter.</div>
          </div>
        </aside>
        <main>
          <div class="stage-wrap">
            <div class="stage" id="stage">
              <div class="stage-meta">
                <span class="name" id="stage-name">—</span>
                <span class="meta-right">
                  <span class="size" id="stage-size">—</span>
                  <button class="icon-btn" id="reset-btn" type="button" title="Reset canvas to default size" aria-label="Reset canvas size">
                    <svg width="13" height="13" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                      <path d="M13 8a5 5 0 1 1-1.46-3.54" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                      <path d="M13 2.5V5h-2.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                  </button>
                </span>
              </div>
              <canvas id="mirui" tabindex="0"></canvas>
              <div class="resize-ring" id="resize-ring" title="Drag to resize"></div>
            </div>
          </div>
          <div class="code-panel" id="code-panel">
            <div class="code-head">
              <span class="title">source · <b id="code-title">—</b></span>
              <span class="actions">
                <button class="icon-btn on" id="focus-btn" type="button" title="Showing core ui! tree — click to show full source" aria-label="Toggle focused source">
                  <svg class="eye-open" width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                    <path d="M1.5 8s2.5-4.5 6.5-4.5S14.5 8 14.5 8 12 12.5 8 12.5 1.5 8 1.5 8Z" stroke="currentColor" stroke-width="1.3"/>
                    <circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.3"/>
                  </svg>
                  <svg class="eye-off" width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true" style="display:none">
                    <path d="M1.5 8s2.5-4.5 6.5-4.5c1.06 0 2.02.32 2.86.81M14.5 8s-.86 1.55-2.5 2.86M9.9 9.9A2 2 0 0 1 6.1 6.1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                    <path d="M2.5 2.5l11 11" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
                  </svg>
                </button>
                <button class="copy-btn" id="copy-btn" type="button" aria-label="Copy source">
                  <svg width="13" height="13" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                    <rect x="5.5" y="5.5" width="8" height="9" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
                    <path d="M3.5 10.5H3a1.5 1.5 0 0 1-1.5-1.5V3A1.5 1.5 0 0 1 3 1.5h6A1.5 1.5 0 0 1 10.5 3v.5" stroke="currentColor" stroke-width="1.4"/>
                  </svg>
                  <span class="label">Copy</span>
                </button>
              </span>
            </div>
            <div class="code-body" id="code-body">
              <pre><code id="code"></code></pre>
            </div>
          </div>
        </main>
      </div>
    </div>
    <script>
      window.addEventListener("TrunkApplicationStarted", () => {
        const params = new URLSearchParams(location.search);
        const activeSlug = params.get("demo") || "dsl";

        const navEl = document.getElementById("nav");
        navEl.innerHTML = wasmBindings.nav_html();

        // Re-insert the "no match" placeholder the wasm HTML just overwrote,
        // and tag each category header with its demo count for the badge.
        const navEmpty = document.createElement("div");
        navEmpty.className = "nav-empty";
        navEmpty.textContent = "No demos match that filter.";
        navEl.appendChild(navEmpty);

        for (const cat of navEl.querySelectorAll(".cat")) {
          const row = cat.nextElementSibling;
          const count = row && row.classList.contains("cat-row")
            ? row.querySelectorAll("a").length
            : 0;
          cat.setAttribute("data-count", String(count));
        }

        let activeLink = null;
        for (const link of navEl.querySelectorAll("a")) {
          if (link.dataset.demo === activeSlug) {
            link.classList.add("active");
            activeLink = link;
          }
        }

        // ── Client-side demo filter ────────────────────────────
        // Operates purely over the existing nav <a> nodes: hides
        // non-matching links and collapses categories that end up empty.
        // Never touches .active or routing (hrefs stay intact).
        const filterInput = document.getElementById("nav-filter");
        const filterWrap = filterInput.closest(".nav-search");
        const filterClear = document.getElementById("nav-filter-clear");

        function applyFilter(raw) {
          const q = raw.trim().toLowerCase();
          filterWrap.classList.toggle("has-text", q.length > 0);
          let anyVisible = false;

          for (const cat of navEl.querySelectorAll(".cat")) {
            const row = cat.nextElementSibling;
            if (!row || !row.classList.contains("cat-row")) continue;
            let catVisible = 0;
            for (const link of row.querySelectorAll("a")) {
              const hay = (link.textContent + " " + (link.dataset.demo || "")).toLowerCase();
              const hit = q === "" || hay.includes(q);
              link.hidden = !hit;
              link.classList.toggle("filter-hit", hit && q !== "");
              if (hit) { catVisible++; anyVisible = true; }
            }
            cat.hidden = catVisible === 0;
            row.hidden = catVisible === 0;
          }
          navEl.classList.toggle("is-empty", !anyVisible);
        }

        filterInput.addEventListener("input", () => applyFilter(filterInput.value));
        filterClear.addEventListener("click", () => {
          filterInput.value = "";
          applyFilter("");
          filterInput.focus();
        });
        filterInput.addEventListener("keydown", (e) => {
          if (e.key === "Escape" && filterInput.value) {
            e.preventDefault();
            filterInput.value = "";
            applyFilter("");
          }
        });

        const canvas = document.getElementById("mirui");
        const stage = document.getElementById("stage");
        const stageName = document.getElementById("stage-name");
        const stageSize = document.getElementById("stage-size");

        // ── Canvas sizing ──────────────────────────────────────
        // mirui re-reads the viewport each frame, so changing both the
        // attribute size and the CSS size is all that's needed; the wasm
        // render loop picks up the new dimensions on its own.
        const MIN_SIZE = 120;
        // Only the CSS box is ours; the wasm surface re-reads clientWidth
        // each frame and owns canvas.width/height (logical × DPR). Writing
        // the attributes here would fight that sync and blank the backing
        // store mid-drag.
        function applyCanvasSize(w, h) {
          w = Math.round(w);
          h = Math.round(h);
          canvas.style.width = `${w}px`;
          canvas.style.height = `${h}px`;
          stageSize.textContent = `${w} × ${h}`;
        }

        let initW = 480;
        let initH = 320;
        if (activeLink) {
          stageName.textContent = activeLink.textContent;
          const w = parseInt(activeLink.dataset.w, 10);
          const h = parseInt(activeLink.dataset.h, 10);
          if (Number.isFinite(w) && Number.isFinite(h)) {
            initW = w;
            initH = h;
          }
          activeLink.scrollIntoView({ block: "nearest" });
        }
        applyCanvasSize(initW, initH);

        // ── Resize ring ────────────────────────────────────────
        // Center-scaling: <main> already flex-centers the stage, so growing
        // the canvas symmetrically keeps it centered. The ring extends
        // outward from the bottom-right corner; we track pointer delta and
        // clamp to [MIN_SIZE, viewport bounds].
        const ring = document.getElementById("resize-ring");
        let resizing = false;
        let startX = 0;
        let startY = 0;
        let startW = 0;
        let startH = 0;

        ring.addEventListener("pointerdown", (e) => {
          e.preventDefault();
          resizing = true;
          startX = e.clientX;
          startY = e.clientY;
          const r = canvas.getBoundingClientRect();
          startW = r.width;
          startH = r.height;
          stage.classList.add("resizing");
          ring.setPointerCapture(e.pointerId);
        });

        ring.addEventListener("pointermove", (e) => {
          if (!resizing) return;
          const maxW = Math.max(MIN_SIZE, window.innerWidth - 80);
          const maxH = Math.max(MIN_SIZE, window.innerHeight - 80);
          const nextW = Math.min(maxW, Math.max(MIN_SIZE, startW + (e.clientX - startX)));
          const nextH = Math.min(maxH, Math.max(MIN_SIZE, startH + (e.clientY - startY)));
          applyCanvasSize(nextW, nextH);
        });

        function endResize(e) {
          if (!resizing) return;
          resizing = false;
          stage.classList.remove("resizing");
          if (e && ring.hasPointerCapture(e.pointerId)) {
            ring.releasePointerCapture(e.pointerId);
          }
        }
        ring.addEventListener("pointerup", endResize);
        ring.addEventListener("pointercancel", endResize);

        // ── Reset to registered size ───────────────────────────
        const resetBtn = document.getElementById("reset-btn");
        resetBtn.addEventListener("click", () => {
          applyCanvasSize(initW, initH);
        });

        // ── Code panel ─────────────────────────────────────────
        const codeEl = document.getElementById("code");
        const codeBody = document.getElementById("code-body");
        const codeTitle = document.getElementById("code-title");
        const copyBtn = document.getElementById("copy-btn");
        const copyLabel = copyBtn.querySelector(".label");

        const RUST_KEYWORDS = new Set([
          "as", "async", "await", "break", "const", "continue", "crate", "dyn",
          "else", "enum", "extern", "false", "fn", "for", "if", "impl", "in",
          "let", "loop", "match", "mod", "move", "mut", "pub", "ref", "return",
          "self", "Self", "static", "struct", "super", "trait", "true", "type",
          "union", "unsafe", "use", "where", "while",
        ]);

        function escapeHtml(s) {
          return s.replace(/[&<>]/g, (c) => (c === "&" ? "&amp;" : c === "<" ? "&lt;" : "&gt;"));
        }

        // Tiny single-pass Rust highlighter. Walks the source char by char,
        // peeling off comments / strings / chars / attributes / numbers /
        // macros / identifiers, and wraps each token in a span. Working on
        // raw text (not HTML) keeps the matcher simple; we escape only the
        // captured slice when emitting.
        function highlightRust(src) {
          let out = "";
          let i = 0;
          const n = src.length;
          const isIdentStart = (c) => /[A-Za-z_]/.test(c);
          const isIdent = (c) => /[A-Za-z0-9_]/.test(c);

          while (i < n) {
            const c = src[i];
            const c2 = src[i + 1];

            // line comment
            if (c === "/" && c2 === "/") {
              let j = i + 2;
              while (j < n && src[j] !== "\n") j++;
              out += `<span class="tok-com">${escapeHtml(src.slice(i, j))}</span>`;
              i = j;
              continue;
            }
            // block comment (nested-aware)
            if (c === "/" && c2 === "*") {
              let j = i + 2;
              let depth = 1;
              while (j < n && depth > 0) {
                if (src[j] === "/" && src[j + 1] === "*") { depth++; j += 2; }
                else if (src[j] === "*" && src[j + 1] === "/") { depth--; j += 2; }
                else j++;
              }
              out += `<span class="tok-com">${escapeHtml(src.slice(i, j))}</span>`;
              i = j;
              continue;
            }
            // string literal (with escapes)
            if (c === '"') {
              let j = i + 1;
              while (j < n) {
                if (src[j] === "\\") { j += 2; continue; }
                if (src[j] === '"') { j++; break; }
                j++;
              }
              out += `<span class="tok-str">${escapeHtml(src.slice(i, j))}</span>`;
              i = j;
              continue;
            }
            // char literal or lifetime — disambiguate by closing quote
            if (c === "'") {
              let j = i + 1;
              if (src[j] === "\\") j += 2;
              else j += 1;
              if (src[j] === "'") {
                // char literal
                out += `<span class="tok-str">${escapeHtml(src.slice(i, j + 1))}</span>`;
                i = j + 1;
              } else {
                // lifetime — emit the apostrophe, let ident run handle the rest
                out += escapeHtml(c);
                i += 1;
              }
              continue;
            }
            // attribute  #[...]  or  #![...]
            if (c === "#" && (c2 === "[" || c2 === "!")) {
              let j = i + 1;
              if (src[j] === "!") j++;
              if (src[j] === "[") {
                let depth = 0;
                while (j < n) {
                  if (src[j] === "[") depth++;
                  else if (src[j] === "]") { depth--; j++; if (depth === 0) break; continue; }
                  j++;
                }
                out += `<span class="tok-attr">${escapeHtml(src.slice(i, j))}</span>`;
                i = j;
                continue;
              }
            }
            // number
            if (/[0-9]/.test(c)) {
              let j = i + 1;
              while (j < n && /[0-9a-fA-FxXoObB_.eE]/.test(src[j])) j++;
              out += `<span class="tok-num">${escapeHtml(src.slice(i, j))}</span>`;
              i = j;
              continue;
            }
            // identifier / keyword / macro / type
            if (isIdentStart(c)) {
              let j = i + 1;
              while (j < n && isIdent(src[j])) j++;
              const word = src.slice(i, j);
              if (src[j] === "!") {
                // macro invocation:  ui!  vec!  println!
                out += `<span class="tok-mac">${escapeHtml(word)}!</span>`;
                i = j + 1;
              } else if (RUST_KEYWORDS.has(word)) {
                out += `<span class="tok-kw">${escapeHtml(word)}</span>`;
                i = j;
              } else if (/^[A-Z]/.test(word)) {
                // PascalCase → treat as type / variant
                out += `<span class="tok-type">${escapeHtml(word)}</span>`;
                i = j;
              } else {
                out += escapeHtml(word);
                i = j;
              }
              continue;
            }
            // plain char
            out += escapeHtml(c);
            i += 1;
          }
          return out;
        }

        let fullSource = "";
        try {
          fullSource = wasmBindings.demo_source(activeSlug) || "";
        } catch (err) {
          fullSource = "";
        }
        let focusSource = "";
        try {
          focusSource = wasmBindings.demo_source_focus(activeSlug) || "";
        } catch (err) {
          focusSource = "";
        }
        // Fall back to full if focus is empty so the toggle is harmless.
        if (!focusSource) focusSource = fullSource;

        // Default to the focused core ui! view each page load.
        let focusMode = true;
        const focusBtn = document.getElementById("focus-btn");
        const eyeOpen = focusBtn.querySelector(".eye-open");
        const eyeOff = focusBtn.querySelector(".eye-off");

        // The string currently shown in the panel — Copy mirrors this.
        function shownSource() {
          return focusMode ? focusSource : fullSource;
        }

        codeTitle.textContent = `${activeSlug}.rs`;

        function renderSource() {
          const src = shownSource();
          if (src) {
            codeEl.innerHTML = highlightRust(src);
          } else {
            codeBody.innerHTML = `<div class="code-empty">No source available for <code>${escapeHtml(activeSlug)}</code>.</div>`;
            copyBtn.disabled = true;
          }
        }

        function applyFocusState() {
          focusBtn.classList.toggle("on", focusMode);
          eyeOpen.style.display = focusMode ? "block" : "none";
          eyeOff.style.display = focusMode ? "none" : "block";
          focusBtn.title = focusMode
            ? "Showing core ui! tree — click to show full source"
            : "Showing full source — click to focus the core ui! tree";
          codeBody.scrollTop = 0;
          renderSource();
        }

        if (!fullSource) {
          copyBtn.disabled = true;
        }
        applyFocusState();

        focusBtn.addEventListener("click", () => {
          focusMode = !focusMode;
          applyFocusState();
        });

        let copyResetTimer = null;
        copyBtn.addEventListener("click", async () => {
          const text = shownSource();
          if (!text) return;
          try {
            await navigator.clipboard.writeText(text);
          } catch (err) {
            // Fallback for non-secure contexts where the Clipboard API is gated.
            const ta = document.createElement("textarea");
            ta.value = text;
            ta.style.position = "fixed";
            ta.style.opacity = "0";
            document.body.appendChild(ta);
            ta.select();
            try { document.execCommand("copy"); } catch (_) {}
            document.body.removeChild(ta);
          }
          copyBtn.classList.add("copied");
          copyLabel.textContent = "Copied!";
          clearTimeout(copyResetTimer);
          copyResetTimer = setTimeout(() => {
            copyBtn.classList.remove("copied");
            copyLabel.textContent = "Copy";
          }, 1400);
        });
      });
    </script>
  </body>
