<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>mirui — gallery</title>
    <link data-trunk rel="rust" data-wasm-opt="z" data-wasm-opt-params="--all-features" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #0d1117;
        --bg-soft: #161b22;
        --bg-hover: #21262d;
        --border: #30363d;
        --text: #c9d1d9;
        --text-dim: #8b949e;
        --accent: #58a6ff;
        --accent-on: #0d1117;
        --cat-color: #f0883e;
        --shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", system-ui, sans-serif;
      }
      .layout {
        display: grid;
        grid-template-columns: 280px 1fr;
        height: 100%;
      }
      aside {
        background: var(--bg-soft);
        border-right: 1px solid var(--border);
        overflow-y: auto;
        padding: 16px 0;
      }
      .brand {
        padding: 0 20px 16px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 8px;
      }
      .brand h1 {
        font-size: 18px;
        margin: 0;
        font-weight: 600;
      }
      .brand .ver {
        color: var(--text-dim);
        font-size: 12px;
        margin-top: 2px;
      }
      .brand a {
        color: var(--accent);
        text-decoration: none;
      }
      #nav { padding: 0 8px; }
      .cat {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--cat-color);
        padding: 12px 12px 6px;
        margin: 0;
      }
      .cat-row {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      #nav a {
        display: block;
        padding: 6px 12px;
        font-size: 13px;
        color: var(--text);
        text-decoration: none;
        border-radius: 6px;
        transition: background 0.1s;
      }
      #nav a:hover {
        background: var(--bg-hover);
      }
      #nav a.active {
        background: var(--accent);
        color: var(--accent-on);
        font-weight: 500;
      }
      main {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        overflow: auto;
      }
      .stage {
        background: var(--bg-soft);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 16px;
        box-shadow: var(--shadow);
      }
      .stage-meta {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 12px;
        gap: 16px;
      }
      .stage-meta .name {
        font-size: 14px;
        font-weight: 500;
      }
      .stage-meta .size {
        font-size: 12px;
        color: var(--text-dim);
        font-feature-settings: "tnum";
      }
      #mirui {
        display: block;
        background: var(--bg);
        border-radius: 4px;
        touch-action: none;
        outline: none;
        max-width: 100%;
      }
      @media (max-width: 720px) {
        .layout {
          grid-template-columns: 1fr;
          grid-template-rows: auto 1fr;
        }
        aside {
          border-right: none;
          border-bottom: 1px solid var(--border);
          max-height: 35vh;
        }
        main { padding: 16px 8px; }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside>
        <div class="brand">
          <h1>mirui</h1>
          <div class="ver"><a href="https://github.com/W-Mai/mirui" target="_blank" rel="noopener">github · W-Mai/mirui</a></div>
        </div>
        <div id="nav"></div>
      </aside>
      <main>
        <div class="stage">
          <div class="stage-meta">
            <span class="name" id="stage-name">—</span>
            <span class="size" id="stage-size">—</span>
          </div>
          <canvas id="mirui" tabindex="0"></canvas>
        </div>
      </main>
    </div>
    <script>
      window.addEventListener("TrunkApplicationStarted", () => {
        const params = new URLSearchParams(location.search);
        const activeSlug = params.get("demo") || "dsl";

        const navEl = document.getElementById("nav");
        navEl.innerHTML = wasmBindings.nav_html();

        let activeLink = null;
        for (const link of navEl.querySelectorAll("a")) {
          if (link.dataset.demo === activeSlug) {
            link.classList.add("active");
            activeLink = link;
          }
        }

        const stageName = document.getElementById("stage-name");
        const stageSize = document.getElementById("stage-size");
        if (activeLink) {
          stageName.textContent = activeLink.textContent;
          const w = activeLink.dataset.w;
          const h = activeLink.dataset.h;
          if (w && h) {
            stageSize.textContent = `${w} × ${h}`;
            const canvas = document.getElementById("mirui");
            canvas.style.width = `${w}px`;
            canvas.style.height = `${h}px`;
          }
          activeLink.scrollIntoView({ block: "nearest" });
        }
      });
    </script>
  </body>
</html>
